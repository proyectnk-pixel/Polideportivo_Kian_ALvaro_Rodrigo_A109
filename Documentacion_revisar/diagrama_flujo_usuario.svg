  <text x="720" y="424" text-anchor="middle" fill="#6a6aaa" font-size="10">RF08 · Barras / líneas</text>
  <text x="720" y="438" text-anchor="middle" fill="#6a6aaa" font-size="10">Ocupación por centro</text>

