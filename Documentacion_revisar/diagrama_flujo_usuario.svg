  <text x="310" y="424" text-anchor="middle" fill="#6a6aaa" font-size="10">RF03 · Frecuencia diaria</text>
  <text x="310" y="438" text-anchor="middle" fill="#6a6aaa" font-size="10">RF04 · Actividad popular</text>

