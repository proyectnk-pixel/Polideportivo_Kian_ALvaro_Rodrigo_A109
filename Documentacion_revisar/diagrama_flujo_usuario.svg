  <text x="405" y="129" text-anchor="middle" fill="#a0a8ff" font-size="10" font-style="italic">Ventana Raylib</text>
  <text x="405" y="147" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Pantalla de Carga</text>
  <text x="405" y="163" text-anchor="middle" fill="#6a6aaa" font-size="10">RF01 · Abrir fichero CSV</text>

  <!-- flecha derecha → decisión -->
  <line x1="520" y1="140" x2="580" y2="140" stroke="#4a4aff" stroke-width="2" marker-end="url(#bl)"/>

