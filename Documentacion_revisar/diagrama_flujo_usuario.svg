  <text x="520" y="424" text-anchor="middle" fill="#6a6aaa" font-size="10">RF06 · Franjas al 100%</text>
  <text x="520" y="438" text-anchor="middle" fill="#6a6aaa" font-size="10">RF07 · Sugerencias alt.</text>

