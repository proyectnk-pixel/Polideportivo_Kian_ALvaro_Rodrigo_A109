  <text x="650" y="135" text-anchor="middle" fill="#f39c12" font-size="11" font-weight="bold">¿Fichero</text>
  <text x="650" y="150" text-anchor="middle" fill="#f39c12" font-size="11" font-weight="bold">válido?</text>

  <!-- NO → error (abajo) -->
  <line x1="650" y1="172" x2="650" y2="212" stroke="#e74c3c" stroke-width="1.8" marker-end="url(#rd)"/>
