<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1080" width="960" height="1080" font-family="'Segoe UI', Arial, sans-serif">

  <!-- ── Fondo general ── -->
